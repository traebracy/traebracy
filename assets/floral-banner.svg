<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated grayscale cherry blossom banner</title>
  <desc id="desc">A soft grayscale cherry blossom branch with subtle line drawing and falling petal animation.</desc>
  <style>
    .branch, .stem, .flower, .bud { stroke-linecap: round; stroke-linejoin: round; }
    .branch { stroke: #666; stroke-width: 2.4; }
    .stem { stroke: #747474; stroke-width: 1.9; }
    .flower { stroke: #565656; stroke-width: 1.8; fill: none; }
    .bud { stroke: #737373; stroke-width: 1.7; fill: #fbfaf8; }
    .soft { opacity: .72; }
    .draw {
      stroke-dasharray: 1500;
      stroke-dashoffset: 1500;
      animation: drawLine 7s ease-in-out infinite;
    }
    .drawSlow {
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: drawLine 8s ease-in-out infinite;
    }
    .breathe { animation: breathe 6s ease-in-out infinite; transform-origin: center; }
    .petal { fill: #cfcfcf; opacity: 0; }
    @keyframes drawLine {
      0% { stroke-dashoffset: 1500; opacity: .2; }
      28% { stroke-dashoffset: 0; opacity: .95; }
      78% { stroke-dashoffset: 0; opacity: .95; }
      100% { stroke-dashoffset: 1500; opacity: .2; }
    }
    @keyframes breathe {
      0%, 100% { opacity: .78; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.012); }
    }
    @media (prefers-reduced-motion: reduce) {
      .draw, .drawSlow, .breathe { animation: none; stroke-dashoffset: 0; }
      animate, animateMotion, animateTransform { display: none; }
      .petal { opacity: .35; }
    }
  </style>

  <rect width="1200" height="250" fill="#fbfaf8"/>
  <path d="M0 214 C135 180, 245 165, 354 151 C462 137, 541 93, 666 101 C790 109, 883 152, 1007 118 C1081 98, 1144 76, 1200 65" class="branch draw"/>
  <path d="M315 155 C351 123, 378 84, 402 34" class="stem drawSlow"/>
  <path d="M438 137 C477 95, 518 69, 571 58" class="stem drawSlow"/>
  <path d="M718 107 C758 72, 789 40, 826 4" class="stem drawSlow"/>
  <path d="M879 148 C914 108, 958 69, 1005 35" class="stem drawSlow"/>
  <path d="M1002 119 C1045 88, 1094 76, 1155 73" class="stem drawSlow"/>

  <g class="breathe">
    <g transform="translate(118 178) rotate(-15)">
      <path d="M0 0 C-23 -17, -17 -47, 7 -56 C34 -66, 57 -43, 50 -14 C44 12, 22 18, 0 0Z" class="flower"/>
      <path d="M2 -2 C19 -20, 29 -35, 45 -53" class="flower soft"/>
      <path d="M-14 -35 C-30 -43, -41 -55, -47 -70" class="stem soft"/>
      <path d="M50 -15 C72 -26, 91 -42, 105 -61" class="stem soft"/>
      <circle cx="15" cy="-25" r="4" fill="#686868" opacity=".55"/>
      <path d="M12 -25 L0 -37 M15 -25 L21 -43 M18 -24 L35 -34" class="flower soft"/>
    </g>

    <g transform="translate(420 100) rotate(8)">
      <path d="M0 0 C-32 -26, -25 -70, 13 -83 C52 -96, 87 -60, 78 -18 C70 20, 30 27, 0 0Z" class="flower"/>
      <path d="M6 -3 C30 -27, 49 -52, 72 -78" class="flower soft"/>
      <path d="M-16 -58 C-40 -67, -58 -84, -67 -107" class="stem soft"/>
      <path d="M78 -18 C112 -31, 136 -54, 158 -84" class="stem soft"/>
      <circle cx="27" cy="-42" r="5" fill="#5c5c5c" opacity=".6"/>
      <path d="M27 -42 L6 -58 M27 -42 L38 -72 M27 -42 L58 -54 M27 -42 L16 -16" class="flower soft"/>
    </g>

    <g transform="translate(650 150) rotate(-7)">
      <path d="M0 0 C-35 -30, -27 -75, 12 -90 C54 -106, 94 -73, 92 -27 C90 16, 32 30, 0 0Z" class="flower"/>
      <path d="M7 -4 C31 -33, 54 -61, 83 -86" class="flower soft"/>
      <path d="M-17 -60 C-43 -73, -63 -93, -72 -119" class="stem soft"/>
      <path d="M92 -28 C126 -39, 158 -60, 188 -89" class="stem soft"/>
      <circle cx="31" cy="-47" r="5" fill="#5c5c5c" opacity=".62"/>
      <path d="M31 -47 L11 -68 M31 -47 L42 -81 M31 -47 L65 -62 M31 -47 L21 -22" class="flower soft"/>
    </g>

    <g transform="translate(900 58) rotate(4)">
      <path d="M0 0 C-34 -28, -26 -76, 17 -90 C59 -104, 99 -67, 90 -22 C82 19, 31 28, 0 0Z" class="flower"/>
      <path d="M7 -4 C33 -27, 55 -58, 82 -85" class="flower soft"/>
      <path d="M-17 -62 C-43 -74, -62 -91, -75 -117" class="stem soft"/>
      <path d="M90 -22 C124 -33, 153 -55, 180 -88" class="stem soft"/>
      <circle cx="32" cy="-46" r="5" fill="#5c5c5c" opacity=".62"/>
      <path d="M32 -46 L10 -63 M32 -46 L44 -78 M32 -46 L65 -60 M32 -46 L21 -19" class="flower soft"/>
    </g>

    <g transform="translate(1020 132) rotate(-10)">
      <path d="M0 0 C-28 -24, -22 -63, 13 -76 C48 -89, 82 -59, 79 -20 C76 17, 27 25, 0 0Z" class="flower"/>
      <path d="M6 -4 C27 -27, 47 -51, 72 -72" class="flower soft"/>
      <path d="M-14 -51 C-37 -61, -52 -77, -61 -101" class="stem soft"/>
      <path d="M79 -21 C110 -30, 136 -47, 161 -73" class="stem soft"/>
      <circle cx="28" cy="-40" r="4" fill="#5c5c5c" opacity=".6"/>
      <path d="M28 -40 L8 -56 M28 -40 L39 -67 M28 -40 L57 -52 M28 -40 L19 -17" class="flower soft"/>
    </g>
  </g>

  <g class="soft">
    <path d="M245 158 C235 139, 244 121, 263 119 C282 117, 295 136, 288 154 C281 174, 254 178, 245 158Z" class="bud"/>
    <path d="M510 74 C499 55, 509 36, 530 34 C550 33, 563 52, 556 71 C548 91, 520 94, 510 74Z" class="bud"/>
    <path d="M772 64 C759 43, 769 21, 793 18 C816 16, 831 38, 822 60 C813 82, 784 87, 772 64Z" class="bud"/>
    <path d="M1112 78 C1104 61, 1112 46, 1129 43 C1146 40, 1159 55, 1154 72 C1148 91, 1121 96, 1112 78Z" class="bud"/>
  </g>

  <g>
    <ellipse class="petal" cx="0" cy="0" rx="4" ry="9" transform="rotate(-20)">
      <animateMotion dur="8s" repeatCount="indefinite" path="M315 75 C290 112, 266 151, 244 232" begin="0s"/>
      <animate attributeName="opacity" values="0;0.55;0.15;0" keyTimes="0;0.18;0.78;1" dur="8s" repeatCount="indefinite" begin="0s"/>
      <animateTransform attributeName="transform" type="rotate" values="-20;20;-18" dur="8s" repeatCount="indefinite" additive="sum" begin="0s"/>
    </ellipse>
    <ellipse class="petal" cx="0" cy="0" rx="3.5" ry="8" transform="rotate(14)">
      <animateMotion dur="9s" repeatCount="indefinite" path="M543 55 C515 95, 520 145, 492 224" begin="1.2s"/>
      <animate attributeName="opacity" values="0;0.5;0.18;0" keyTimes="0;0.22;0.78;1" dur="9s" repeatCount="indefinite" begin="1.2s"/>
      <animateTransform attributeName="transform" type="rotate" values="14;-28;18" dur="9s" repeatCount="indefinite" additive="sum" begin="1.2s"/>
    </ellipse>
    <ellipse class="petal" cx="0" cy="0" rx="4" ry="8.5" transform="rotate(22)">
      <animateMotion dur="7.5s" repeatCount="indefinite" path="M750 82 C723 114, 735 160, 700 232" begin="2s"/>
      <animate attributeName="opacity" values="0;0.52;0.2;0" keyTimes="0;0.2;0.78;1" dur="7.5s" repeatCount="indefinite" begin="2s"/>
      <animateTransform attributeName="transform" type="rotate" values="22;-20;26" dur="7.5s" repeatCount="indefinite" additive="sum" begin="2s"/>
    </ellipse>
    <ellipse class="petal" cx="0" cy="0" rx="3.5" ry="8" transform="rotate(-8)">
      <animateMotion dur="8.5s" repeatCount="indefinite" path="M945 50 C920 90, 941 145, 912 225" begin=".6s"/>
      <animate attributeName="opacity" values="0;0.5;0.16;0" keyTimes="0;0.18;0.8;1" dur="8.5s" repeatCount="indefinite" begin=".6s"/>
      <animateTransform attributeName="transform" type="rotate" values="-8;30;-24" dur="8.5s" repeatCount="indefinite" additive="sum" begin=".6s"/>
    </ellipse>
    <ellipse class="petal" cx="0" cy="0" rx="3" ry="7" transform="rotate(10)">
      <animateMotion dur="10s" repeatCount="indefinite" path="M1075 92 C1045 125, 1065 167, 1035 232" begin="3s"/>
      <animate attributeName="opacity" values="0;0.45;0.14;0" keyTimes="0;0.18;0.78;1" dur="10s" repeatCount="indefinite" begin="3s"/>
      <animateTransform attributeName="transform" type="rotate" values="10;-22;18" dur="10s" repeatCount="indefinite" additive="sum" begin="3s"/>
    </ellipse>
  </g>
</svg>
